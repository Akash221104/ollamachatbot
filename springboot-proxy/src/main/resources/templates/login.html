<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Chatbot Proxy</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --error: #ef4444;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      top: 10%;
      left: 10%;
      z-index: 0;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
      bottom: 10%;
      right: 10%;
      z-index: 0;
    }
    .login-container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      z-index: 1;
      box-sizing: border-box;
    }
    h2 {
      font-size: 28px;
      font-weight: 800;
      margin-top: 0;
      margin-bottom: 8px;
      text-align: center;
      background: linear-gradient(135deg, #6366f1 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: var(--text-muted);
      text-align: center;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-muted);
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
      background: rgba(255, 255, 255, 0.08);
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }
    .btn:active {
      transform: translateY(0);
    }
    .alert {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
    }
    .demo-credentials {
      margin-top: 24px;
      border-top: 1px dashed var(--border);
      padding-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .demo-credentials p {
      margin: 4px 0;
    }
    .credential-badge {
      background: rgba(255, 255, 255, 0.07);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      color: #a78bfa;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Secure Gateway</h2>
    <div class="subtitle">Log in to access the Enterprise AI Chatbot</div>

    <form th:action="@{/login}" method="post">
      <!-- Error Message -->
      <div th:if="${param.error}" class="alert">
        Invalid username or password.
      </div>
      
      <!-- Logout Message -->
      <div th:if="${param.logout}" class="alert" style="background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); color: #a7f3d0;">
        You have been logged out successfully.
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="e.g., akash" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn">Log In</button>
    </form>

    <div class="demo-credentials">
      <p style="font-weight: 600; margin-bottom: 8px; color: var(--text);">Demo Credentials:</p>
      <p>User 1: <span class="credential-badge">akash</span> / <span class="credential-badge">password123</span></p>
      <p>User 2: <span class="credential-badge">rahul</span> / <span class="credential-badge">password123</span></p>
    </div>
  </div>
</body>
</html>
